[keyboard]
name = "simple34"
vendor_id = 0x4c4b
product_id = 0x4643
manufacturer = "Terence Ng"
serial_number = "vial:f64c2b3c"
chip = "nrf52840"

[rmk]1

[host]
unlock_keys = []

[storage]
clear_layout = true

[split]
connection = "ble"

[split.central]
rows = 4
cols = 6
row_offset = 0
col_offset = 0

[split.central.matrix]
matrix_type = "normal"
row_pins = ["P1_00", "P0_11", "P1_04", "P1_06"]
col_pins = ["P0_31", "P0_29", "P0_02", "P1_15", "P1_13", "P1_11"]

[[split.peripheral]]
rows = 4
cols = 6
row_offset = 0
col_offset = 6

[split.peripheral.matrix]
matrix_type = "normal"
row_pins = ["P1_00", "P0_11", "P1_04", "P1_06"]
col_pins = ["P0_31", "P0_29", "P0_02", "P1_15", "P1_13", "P1_11"]

[layout]
rows = 4
cols = 12
layers = 6
matrix_map = """
    (0,0)  (0,1)  (0,2)  (0,3)  (0,4)                    (0,10) (0,9)  (0,8)  (0,7)  (0,6)
    (1,0)  (1,1)  (1,2)  (1,3)  (1,4)                    (1,10) (1,9)  (1,8)  (1,7)  (1,6)
    (2,0)  (2,1)  (2,2)  (2,3)  (2,4)                    (2,10) (2,9)  (2,8)  (2,7)  (2,6)
                                 (3,4)  (3,5)  (3,11) (3,10)
"""

[behavior.morse]
enable_flow_tap = true
prior_idle_time = "120ms"
hold_on_other_press = true
hold_timeout = "200ms"
gap_timeout = "200ms"
morses = [
    { tap = "Q", double_tap = "Escape" },
]

[behavior.morse.profiles]
HRM = { unilateral_tap = true, permissive_hold = true, hold_timeout = "200ms", gap_timeout = "200ms" }
FH = { hold_on_other_press = true, unilateral_tap = false, hold_timeout = "210ms", gap_timeout = "210ms" }

[behavior.combo]
timeout = "50ms"
combos = [
    { actions = ["MT(F,LShift,HRM)", "MT(J,RShift,HRM)"], output = "CapsLock", layer = 0 },
]

# Layer 0: QWERTY base
[[layer]]
name = "base"
keys = """
TD(0)                  W                      E                      R                      T                      Y                      U                      I                      O                      P
MT(A,LGui,HRM)         MT(S,LAlt,HRM)         MT(D,LCtrl,HRM)        MT(F,LShift,HRM)       G                      H                      MT(J,RShift,HRM)       MT(K,RCtrl,HRM)        MT(L,LAlt,HRM)         MT(Semicolon,RGui,HRM)
Z                      X                      C                      V                      B                      N                      M                      Comm                   Dot                    Slsh
                                                                     LT(1,Space,FH)         LT(2,Tab,FH)           LT(3,Enter,FH)         LT(4,Backspace,FH)
"""

# Layer 1: Numbers & Symbols
[[layer]]
name = "lower"
keys = """
Kc1                    Kc2                    Kc3                    Kc4                    Kc5                    Kc6                    Kc7                    Kc8                    Kc9                    Kc0
Grave                  Minus                  Equal                  LeftBracket            _                      _                      RightBracket           Quote                  NonusBackslash         NonusHash
LGui                   LAlt                   LCtrl                  LShift                 _                      _                      RShift                 RCtrl                  LAlt                   RGui
                                                                     _                      _                      _                      _
"""

# Layer 2: Shifted Symbols
[[layer]]
name = "raise"
keys = """
WM(Kc1,LShift)         WM(Kc2,LShift)         WM(Kc3,LShift)         WM(Kc4,LShift)         WM(Kc5,LShift)         WM(Kc6,LShift)         WM(Kc7,LShift)         WM(Kc8,LShift)         WM(Kc9,LShift)         WM(Kc0,LShift)
WM(Grave,LShift)       WM(Minus,LShift)       WM(Equal,LShift)       WM(LeftBracket,LShift) _                      _                      WM(RightBracket,LShift) WM(Quote,LShift)      WM(NonusBackslash,LShift) WM(NonusHash,LShift)
LGui                   LAlt                   LCtrl                  LShift                 _                      _                      RShift                 RCtrl                  LAlt                   RGui
                                                                     _                      _                      _                      _
"""

# Layer 3: Function & Navigation
[[layer]]
name = "function"
keys = """
F1                     F2                     F3                     F4                     _                      Home                   PgDn                   PgUp                   End                    Ins
F5                     F6                     F7                     F8                     _                      Left                   Down                   Up                     Right                  Del
F9                     F10                    F11                    F12                    _                      _                      RShift                 RCtrl                  LAlt                   RGui
                                                                     _                      _                      _                      _
"""

# Layer 4: Media & Mouse
[[layer]]
name = "media"
keys = """
MediaPrevTrack         MediaPlayPause         MediaNextTrack         MediaStop              _                      MouseWheelLeft         MouseWheelDown         MouseWheelUp           MouseWheelRight        MouseBtn1
AudioMute              AudioVolDown           AudioVolUp             BrightnessDown         BrightnessUp           MouseLeft              MouseDown              MouseUp                MouseRight             MouseBtn3
_                      _                      _                      _                      _                      _                      _                      _                      _                      MouseBtn2
                                                                     _                      _                      _                      _
"""